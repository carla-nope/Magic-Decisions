version: 1

public: true

media:
  folder: public/images
  public_folder: /images

content:
  blog:
    label: Blog Posts
    label_singular: Blog Post
    folder: content/blog
    create: true
    delete: true
    fields:
      - label: Title
        name: title
        type: string
        required: true
      - label: Date
        name: date
        type: date
        required: true
        date_format: YYYY-MM-DD
      - label: Excerpt
        name: excerpt
        type: text
      - label: Category
        name: category
        type: string
      - label: Featured
        name: featured
        type: boolean
        default: false
      - label: Author
        name: author
        type: string
        default: MagicDecisions
      - label: Body
        name: body
        type: markdown
